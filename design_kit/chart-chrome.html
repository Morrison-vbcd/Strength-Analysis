<title>圖表骨架 — 格線 / 軸線 / 序列色 / RRG 象限</title>
<style>

</style>
<div class="kit">

    <rect x="150" y="10" width="90" height="150" fill="rgba(229,83,75,0.10)"/>
    <rect x="380" y="10" width="70" height="150" fill="rgba(229,83,75,0.10)"/>
    <g stroke="#21262e" stroke-width="1">
      <line x1="40" y1="40" x2="550" y2="40"/><line x1="40" y1="80" x2="550" y2="80"/>
      <line x1="40" y1="120" x2="550" y2="120"/>

    <line x1="40" y1="160" x2="550" y2="160" stroke="#3d4550" stroke-width="1"/>
    <line x1="40" y1="100" x2="550" y2="100" stroke="#3d4550" stroke-dasharray="3 3"/>

      points="40,120 100,110 150,95 200,105 240,80 300,70 340,85 380,60 450,72 550,35"/>

  <h2>RRG 象限（底色 6% 透明、標籤 #8b949e、十字 #3d4550、防禦 = ◆）</h2>
  <svg viewBox="0 0 560 220" width="560" height="220" role="img" aria-label="RRG 樣例">
    <rect x="280" y="10"  width="270" height="100" fill="rgba(46,204,113,0.06)"/>
    <rect x="280" y="110" width="270" height="100" fill="rgba(255,183,77,0.06)"/>
    <rect x="10"  y="110" width="270" height="100" fill="rgba(229,83,75,0.06)"/>
    <rect x="10"  y="10"  width="270" height="100" fill="rgba(77,163,255,0.06)"/>
    <line x1="10" y1="110" x2="550" y2="110" stroke="#3d4550"/>
    <line x1="280" y1="10" x2="280" y2="210" stroke="#3d4550"/>

    <text x="545" y="202" font-size="11" fill="#8b949e" text-anchor="end">轉弱 Weakening</text>
    <text x="16" y="202" font-size="11" fill="#8b949e">落後 Lagging</text>
    <text x="16" y="24" font-size="11" fill="#8b949e">改善 Improving</text>

    <circle cx="180" cy="160" r="7" fill="#FD3216" stroke="#fff" stroke-width="1"/>

  <p>identity 由每點的直接標籤承載（15 序列超出安全上限,顏色僅輔助）;板塊亮色盤 = Light24。</p>
