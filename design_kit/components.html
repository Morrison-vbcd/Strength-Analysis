<!-- @dsCard group="Components" -->
<title>元件 — metric 卡 / 象限卡 / 訊號標籤</title>
<style>
  .kit { font-family: system-ui, "Segoe UI", sans-serif; background:#0d1117; color:#e6edf3;
         padding:24px; border-radius:10px; }
  .kit h2 { font-size:14px; letter-spacing:.08em; color:#8b949e; margin:18px 0 10px; }
  .row { display:flex; gap:12px; flex-wrap:wrap; }
  .metric { background:#161b22; border:1px solid #262d37; border-radius:8px; padding:12px 16px; min-width:130px; }
  .metric .l { font-size:12px; color:#8b949e; }
  .metric .v { font-size:26px; font-weight:600; font-variant-numeric:tabular-nums; margin-top:2px; }
  .metric .v.up { color:#22c37e; } .metric .v.dn { color:#e5534b; }
  .quad { background:#161b22; border:1px solid #262d37; border-radius:8px; padding:12px 14px; width:150px; }
  .quad .h { font-size:13px; font-weight:700; margin-bottom:8px; }
  .quad .it { font-size:12px; color:#8b949e; padding:2px 0; font-variant-numeric:tabular-nums; }
  .tag { display:inline-block; font-size:12px; border-radius:5px; padding:3px 10px; margin-right:8px; border:1px solid; }
  .tag.bull { color:#22c37e; border-color:rgba(34,195,126,.4); background:rgba(34,195,126,.08); }
  .tag.bear { color:#e5534b; border-color:rgba(229,83,75,.4); background:rgba(229,83,75,.08); }
  .tag.pend { color:#c98500; border-color:rgba(201,133,0,.4); background:rgba(201,133,0,.08); }
  .btn { display:inline-block; background:#22c37e; color:#0d1117; font-weight:700; font-size:14px;
         border-radius:6px; padding:9px 18px; margin-right:10px; }
  .btn.ghost { background:transparent; color:#e6edf3; border:1px solid #262d37; font-weight:400; }
</style>
<div class="kit">
  <h2>METRIC 卡（st.metric 的 CSS 卡片化）</h2>
  <div class="row">
    <div class="metric"><div class="l">勝率</div><div class="v">60.0%</div></div>
    <div class="metric"><div class="l">總報酬</div><div class="v up">+6.94%</div></div>
    <div class="metric"><div class="l">現況 z-score</div><div class="v dn">−2.31</div></div>
    <div class="metric"><div class="l">半衰期（天）</div><div class="v">50</div></div>
  </div>
  <h2>象限一覽卡</h2>
  <div class="row">
    <div class="quad"><div class="h">🟩 領先</div><div class="it">金融 XLF｜101.5</div><div class="it">🛡️公用事業｜100.0</div></div>
    <div class="quad"><div class="h">🟦 改善</div><div class="it">能源 XLE｜99.9</div><div class="it">房地產｜99.7</div></div>
    <div class="quad"><div class="h">🟨 轉弱</div><div class="it">生技 XBI｜101.1</div></div>
    <div class="quad"><div class="h">🟥 落後</div><div class="it">科技 XLK｜100.0</div><div class="it">半導體｜99.9</div></div>
  </div>
  <h2>訊號標籤（狀態一律 icon+文字,不靠顏色單獨承載）</h2>
  <div>
    <span class="tag bull">⭐ 壓力段RS新高</span>
    <span class="tag bear">⚠️ 領漲背離</span>
    <span class="tag pend">⏳ 進行中（未確認）</span>
  </div>
  <h2>按鈕</h2>
  <div><span class="btn">🚀 開始分析</span><span class="btn ghost">🧲 推薦同質參考股</span></div>
</div>
