<title>字體與數字 — 系統無襯線 + 表格數字</title>
<style>
  .kit { font-family: system-ui, "Segoe UI", sans-serif; background:#0d1117; color:#e6edf3;
         padding:24px; border-radius:10px; }
  .kit h2 { font-size:14px; letter-spacing:.08em; color:#8b949e; margin:16px 0 8px; }
  .h1x { font-size:28px; font-weight:700; letter-spacing:.02em; }
  .capx { font-size:12.5px; color:#8b949e; }
  .num { font-variant-numeric: tabular-nums; font-size:15px; }
  .num .up { color:#22c37e; } .num .dn { color:#e5534b; }
  table { border-collapse:collapse; font-size:13px; }
  td, th { padding:5px 14px 5px 0; text-align:right; font-variant-numeric:tabular-nums; }
  th { color:#8b949e; font-weight:400; }
</style>
<div class="kit">
  <h2>層級</h2>
  <div class="h1x">📊 個股相對強弱</div>
  <div class="capx">RS = 個股 / 基準。顏色 = 相對強弱（綠 = 贏過族群、紅 = 輸給族群），不是絕對漲跌。</div>
  <h2>數字：一律 tabular-nums 對齊;漲跌色只上在數值本身</h2>
  <table>
    <tr><th>代碼</th><th>最新段相對強弱%</th><th>全窗口RS變化%</th><th>收盤價</th></tr>
    <tr><td>🎯 MU</td><td class="num"><span class="up">+46.48</span></td><td class="num"><span class="up">+128.31</span></td><td class="num">211.40</td></tr>
    <tr><td>WDC</td><td class="num"><span class="dn">−21.68</span></td><td class="num"><span class="dn">−14.02</span></td><td class="num">88.15</td></tr>
  </table>
  <h2>規則</h2>
  <div class="capx">
    全站 system-ui 無襯線,不用展示字體;標題 letter-spacing .02em;
    說明文字一律 text_dim #8b949e;文字永遠穿 ink 色,序列色只給圖形標記。
  </div>
</div>
